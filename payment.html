<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="robots" content="noindex">
  <meta name="theme-color" content="#0a0a0b">
  <title>Оплата видеоотбора — ТЕНЬ</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="assets/icons/apple-touch-icon.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ТЕНЬ">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Unbounded:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=20260709h">
  <!-- payment flow: yookassa · card-fix 2026-07-09 -->
  <style>
    .pay-shell {
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: max(40px, env(safe-area-inset-top)) 20px max(48px, env(safe-area-inset-bottom));
    }
    /* Переопределяем .glass-card: у него нет скругления/паддингов,
       а белый бордюр теряется на белом фоне — отсюда «корявые» края. */
    .pay-card.glass-card {
      width: 100%;
      max-width: 460px;
      padding: 44px 38px 34px;
      border-radius: 28px;
      background: #ffffff;
      border: 1px solid rgba(10, 10, 11, 0.06);
      box-shadow:
        0 32px 80px rgba(0, 0, 0, 0.14),
        0 6px 18px rgba(0, 0, 0, 0.06);
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }
    @media (max-width: 520px) {
      .pay-card.glass-card {
        padding: 34px 24px 28px;
        border-radius: 24px;
      }
    }
    .pay-logo {
      font-family: Unbounded, sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-align: center;
      color: var(--muted);
      margin-bottom: 32px;
    }
    .pay-price-label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .pay-price {
      font-family: Unbounded, sans-serif;
      font-size: clamp(42px, 12vw, 64px);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--ink);
      line-height: 1;
      margin-bottom: 6px;
    }
    .pay-price-period {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }
    .pay-includes {
      list-style: none;
      margin: 0 0 28px;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .pay-includes li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 15px;
      color: var(--ink);
    }
    .pay-includes li::before {
      content: "✓";
      font-size: 14px;
      font-weight: 700;
      color: #22c55e;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .pay-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 18px 28px;
      font-family: Inter, sans-serif;
      font-size: 17px;
      font-weight: 700;
      border: none;
      border-radius: 18px;
      background: var(--ink);
      color: #fff;
      cursor: pointer;
      transition: opacity 0.18s, transform 0.14s;
      -webkit-tap-highlight-color: transparent;
    }
    .pay-btn:active { transform: scale(0.97); opacity: 0.85; }
    .pay-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .pay-note {
      margin-top: 16px;
      font-size: 13px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }
    .pay-back {
      display: block;
      text-align: center;
      margin-top: 20px;
      font-size: 14px;
      color: var(--muted);
      text-decoration: underline;
      text-underline-offset: 3px;
    }
    .pay-back:hover { color: var(--ink); }
  </style>
</head>
<body>
  <main class="pay-shell">
    <div class="pay-card glass-card">
      <p class="pay-logo">ЧЕМПИОНАТ <span style="opacity:.4">|</span> ТЕНЬ</p>
      <p class="pay-price-label">Регистрационный взнос</p>
      <p class="pay-price" id="pay-price">—</p>
      <p class="pay-price-period" id="pay-period"></p>
      <ul class="pay-includes">
        <li>Участие в видеоотборе</li>
        <li>Личная обратная связь от Кристины Бродецкой</li>
        <li>Возможность выбрать несколько категорий</li>
        <li>Взнос не возвращается</li>
      </ul>
      <button class="pay-btn" id="pay-btn" type="button">
        Оплатить <span id="pay-btn-price"></span>
      </button>
      <p class="pay-note">После оплаты вы перейдёте к заполнению заявки</p>
      <a class="pay-back" href="index.html">← На главную</a>
    </div>
  </main>

  <script src="config.js"></script>
  <script>
    (() => {
      const API_BASE = (window.SHADOW_CONFIG && window.SHADOW_CONFIG.API_BASE) || "";
      const now = new Date();
      const month = now.getMonth() + 1; // 1-based
      let price = 1700;
      let period = "10 июля — 31 июля";
      if (month > 7) {
        price = 2000;
        period = "1 августа — 7 сентября";
      }
      document.getElementById("pay-price").textContent = price.toLocaleString("ru") + " ₽";
      document.getElementById("pay-period").textContent = "Тарифный период: " + period;
      document.getElementById("pay-btn-price").textContent = price.toLocaleString("ru") + " ₽";

      const btn = document.getElementById("pay-btn");
      const note = document.querySelector(".pay-note");

      btn.addEventListener("click", async function () {
        btn.disabled = true;
        btn.textContent = "Создаём платёж…";

        // Бэкенд не задан — режим предпросмотра: пропускаем к заявке.
        if (!API_BASE) {
          location.href = "apply.html?paid=1";
          return;
        }

        try {
          const res = await fetch(`${API_BASE}/api/payment/create`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: "{}",
          });

          if (res.status === 503) {
            // Оплата ещё не подключена на сервере — не блокируем подачу.
            location.href = "apply.html?paid=1";
            return;
          }

          const data = await res.json().catch(() => ({}));
          if (res.ok && data.confirmationUrl && data.paymentId) {
            try {
              sessionStorage.setItem("shadow_payment_id", data.paymentId);
              localStorage.setItem("shadow_payment_id", data.paymentId);
            } catch {}
            location.href = data.confirmationUrl;
          } else {
            throw new Error(data.error || "create_failed");
          }
        } catch (err) {
          btn.disabled = false;
          btn.textContent = "Оплатить " + price.toLocaleString("ru") + " ₽";
          if (note) {
            note.textContent = "Не удалось создать платёж. Попробуйте ещё раз через минуту.";
            note.style.color = "#dc2626";
          }
        }
      });
    })();
  </script>
</body>
</html>
